<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Workout Collector</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  }
  h1 { font-size: 22px; margin: 8px 0 2px; }
  .sub { color: #6e6e73; font-size: 13px; margin-top: 0; }
  .card {
    background: white; border-radius: 14px; padding: 14px 16px; margin-bottom: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .btn {
    display: block; width: 100%; padding: 16px; font-size: 17px; font-weight: 600;
    border: none; border-radius: 12px; background: #0071e3; color: white; margin-top: 10px;
  }
  .btn:active { background: #005bb5; }
  .btn.secondary { background: #e5e5ea; color: #1d1d1f; }
  .btn.secondary:active { background: #d1d1d6; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .home-section-label { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em;
    color: #8e8e93; margin: 18px 4px 6px; }
  .ex-name { font-weight: 600; font-size: 16px; color: #0071e3; }
  .ex-target { color: #8e8e93; font-size: 13px; margin-bottom: 8px; }
  .detail-block {
    background: #f5f5f7; border-radius: 8px; padding: 10px 12px; margin: 6px 0 10px;
    font-size: 13px; color: #3a3a3c; line-height: 1.4;
  }
  .detail-block a { color: #0071e3; font-weight: 600; display: inline-block; margin-top: 6px; }
  .stepper-row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; }
  .stepper-row .label { font-size: 14px; color: #48484a; width: 60px; flex-shrink: 0; }
  .stepper { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: flex-end; }
  .stepper button {
    width: 34px; height: 34px; border-radius: 9px; border: none; background: #e5e5ea;
    font-size: 18px; font-weight: 600; color: #1d1d1f; line-height: 1;

  .stepper button:active { background: #d1d1d6; }
  .stepper .val { min-width: 68px; text-align: center; font-size: 15px; font-weight: 600; }
  .setgrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin: 8px 0; }
  .setcell { text-align: center; }
  .setcell .setlabel { font-size: 11px; color: #8e8e93; margin-bottom: 3px; }
  .setcell .mini { display: flex; align-items: center; justify-content: center; gap: 4px; }
  .setcell .mini button {
    width: 26px; height: 26px; border-radius: 7px; border: none; background: #e5e5ea;
    font-size: 15px; font-weight: 600; line-height: 1;
  }
  .setcell .mini .v { min-width: 30px; text-align: center; font-size: 13px; font-weight: 600; }
  .bandgrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 8px 0; }
  .bandtier { background: #f5f5f7; border-radius: 10px; padding: 6px; text-align: center; }
  .bandtier .tlabel { font-size: 12px; color: #6e6e73; margin-bottom: 4px; font-weight: 600; }
  .bandtier .mini { display: flex; align-items: center; justify-content: center; gap: 4px; }
  .bandtier .mini button {
    width: 28px; height: 28px; border-radius: 7px; border: none; background: #e5e5ea;
    font-size: 15px; font-weight: 700;
  }
  .bandtier .mini .v { min-width: 20px; text-align: center; font-size: 14px; font-weight: 700; }
  .band-total { font-size: 14px; font-weight: 600; margin-top: 4px; color: #1d1d1f; }
  .variant-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .variant-btn {
    flex: 1; padding: 10px 6px; border-radius: 10px; border: 1.5px solid #d1d1d6;
    background: white; font-size: 13px; font-weight: 600; color: #1d1d1f;
  }
  .variant-btn.selected { background: #0071e3; border-color: #0071e3; color: white; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; }
  .toggle-btn {

  .check-item { border-bottom: 1px solid #f0f0f2; padding: 10px 0; }
  .check-item:last-child { border-bottom: none; }
  .check-item .name { font-size: 14px; font-weight: 600; color: #0071e3; }
  .badge {

    font-weight: 600; background: #e5e5ea; color: #48484a; margin-top: 4px;

  .badge.top { background: #34c759; color: white; }
  .note-link { font-size: 13px; color: #0071e3; margin-top: 4px; display: inline-block; }

/* ============================== HELPERS ============================== */

function todayLocal() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function yymmdd() {
  const d = new Date();
  return `${String(d.getFullYear()).slice(2)}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v === null ? fallback : JSON.parse(v); }
  catch (e) { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}
function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }

function bandTotal(mix) {
  return BAND_TIERS.reduce((sum, t) => sum + t * (mix[t] || 0), 0);
}
function bandBreakdown(mix) {
  const parts = BAND_TIERS.filter(t => mix[t] > 0).map(t => `${mix[t]}\u00d7${t}`);
  return parts.length ? parts.join('+') : 'none';
}
function fmtWeight(cfg, val) {
  if (!cfg) return "BW";
  if (cfg.type === "bandmix") {
    const total = bandTotal(val);
    return total === 0 ? "0 lbs" : `${total} lbs (${bandBreakdown(val)})`;
  }
  if (val === 0 && cfg.bwLabel) return cfg.bwLabel;
  return `${val} ${cfg.unit}`;
}
function defaultBandMix() { const m = {}; BAND_TIERS.forEach(t => m[t] = 0); return m; }

const app = document.getElementById('app');

/* ============================== SHARE ============================== */

async function shareJSON(payload, filenameBase, statusElId) {
  const json = JSON.stringify(payload, null, 2);
  const filename = `${filenameBase}.json`;
  const file = new File([json], filename, { type: "application/json" });
  const statusEl = document.getElementById(statusElId);
  const show = (msg, cls) => { statusEl.textContent = msg; statusEl.className = 'show ' + (cls || ''); };
  if (!navigator.canShare || !navigator.canShare({ files: [file] })) {
    show("This device/browser can't share files. Open this page in Safari on the iPad.", "err");
    return;
  }
  try {
    await navigator.share({ files: [file], title: `Workout ${yymmdd()}` });
    show(`Shared ${filename}. Confirm in Mail that the file is actually attached before sending.`, "ok");
  } catch (err) {
    if (err.name !== "AbortError") show("Share failed: " + err.message, "err");
  }
}

/* ============================== SETTINGS: BACKUP / RESTORE ============================== */

function gatherSettingsData() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.indexOf('w_') === 0) data[key] = localStorage.getItem(key);
  }
  return data;
}
function applySettingsData(data) {
  const keys = Object.keys(data);
  keys.forEach(k => localStorage.setItem(k, data[k]));
  return keys.length;
}
async function exportSettings() {
  const data = gatherSettingsData();
  const count = Object.keys(data).length;
  const json = JSON.stringify(data, null, 2);
  const filename = `workout_settings_${todayLocal()}.json`;
  const file = new File([json], filename, { type: "application/json" });
  const statusEl = document.getElementById('settings-status');
  if (count === 0) {
    statusEl.textContent = "Nothing to export yet \u2014 no exercise has been shared from this device.";
    statusEl.className = 'show err';
    return;
  }
  if (!navigator.canShare || !navigator.canShare({ files: [file] })) {
    statusEl.textContent = "This browser can't share files. Open in Safari.";
    statusEl.className = 'show err';
    return;
  }
  try {
    await navigator.share({ files: [file], title: "Workout Settings Backup" });
    statusEl.textContent = `Shared ${filename} (${count} saved values). AirDrop is the fastest way to get it to your other device.`;
    statusEl.className = 'show ok';
  } catch (err) {
    if (err.name !== "AbortError") { statusEl.textContent = "Export failed: " + err.message; statusEl.className = 'show err'; }
  }
}
function handleImportFile(inputEl) {
  const file = inputEl.files[0];
  const statusEl = document.getElementById('settings-status');
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      const count = applySettingsData(data);
      statusEl.textContent = `Restored ${count} saved values. New exercise screens will now start from these baselines.`;
      statusEl.className = 'show ok';
    } catch (err) {
      statusEl.textContent = "That file didn't look like a settings backup: " + err.message;
      statusEl.className = 'show err';
    }
  };
  reader.readAsText(file);
}
function goSettings() { state = { screen: 'settings' }; renderSettings(); }
function renderSettings() {
  const count = Object.keys(gatherSettingsData()).length;
  app.innerHTML = `<a class="backlink" onclick="goHome()">&larr; Home</a>
    <h1>Backup / Restore</h1>
    <p class="sub">Weight and band baselines are stored on this device only. Use this to carry them to another device.</p>
    <div class="card">
      <div class="card-title">This device</div>
      <p style="font-size:14px;margin:4px 0 10px;">${count} saved value${count===1?'':'s'} on this device.</p>
      <button class="btn" onclick="exportSettings()">Export (Share / AirDrop)</button>
    </div>
    <div class="card">
      <div class="card-title">Restore on this device</div>
      <p style="font-size:14px;margin:4px 0 10px;">Pick a settings file exported from another device.</p>
      <input type="file" accept="application/json" id="import-file" style="display:none" onchange="handleImportFile(this)">
      <button class="btn secondary" onclick="document.getElementById('import-file').click()">Choose File to Import</button>
    </div>
    <div id="settings-status"></div>`;
}

function goStrength(dayNum) {
  const exList = STRENGTH_DAYS[dayNum];
  state = {
    screen: 'strength',
    day: dayNum,
    date: todayLocal(),
    checklist: { "Warm-up (5-min light cardio + dynamic prep)": false,
                 "Balance (single-leg stance, rest intervals)": false },
    stretches: makeStretchState(String(dayNum)),
    entries: exList.map(cfg => buildEntryFromConfig(dayNum, cfg)),
  };
  renderStrength();
}

function buildEntryFromConfig(dayNum, cfg, variantName) {
  const isVariant = !!cfg.variants;
  const chosen = variantName || (isVariant ? cfg.variants[0] : null);
  const active = isVariant ? cfg.variantOverrides[chosen] : cfg;
  const wcfg = active.weight;
  const baseKey = `w_${dayNum}_${cfg.item}${isVariant ? '_' + chosen : ''}`;
  let weightVal;
  if (!wcfg) weightVal = "BW";
  else if (wcfg.type === "bandmix") weightVal = lsGet(baseKey, null) || defaultBandMix();
  else weightVal = lsGet(baseKey, null) !== null ? lsGet(baseKey, null) : wcfg.default;
  return {
    item: isVariant ? chosen : cfg.item,
    variantBase: cfg.item,
    variants: cfg.variants || null,
    variantOverrideTarget: isVariant ? (active.target || '') : undefined,
    target: isVariant ? undefined : cfg.target,
    unit: active.unit || cfg.unit,
    weightCfg: wcfg,
    weight: weightVal,
    reps: [active.repDefault, active.repDefault, active.repDefault],
    repTop: active.repTop,
    topOfRange: active.repDefault >= active.repTop ? "Y" : "N",
    topOverridden: false,
    notes: "",
    noteOpen: false,
    detailOpen: false,
  };
}

function toggleChecklist(label) { state.checklist[label] = !state.checklist[label]; renderStrength(); }

function selectVariant(i, variantName) {
  const cfg = STRENGTH_DAYS[state.day][i];
  const oldNotes = state.entries[i].notes, oldNoteOpen = state.entries[i].noteOpen;
  state.entries[i] = buildEntryFromConfig(state.day, cfg, variantName);
  state.entries[i].notes = oldNotes; state.entries[i].noteOpen = oldNoteOpen;
  renderStrength();
}

function adjustWeight(i, delta) {
  const entry = state.entries[i];
  entry.weight = clamp(Math.round((entry.weight + delta) * 10) / 10, entry.weightCfg.min, entry.weightCfg.max);
  document.getElementById(`w-val-${i}`).textContent = fmtWeight(entry.weightCfg, entry.weight);
}
function adjustBand(i, tier, delta) {
  const entry = state.entries[i];
  entry.weight[tier] = clamp((entry.weight[tier] || 0) + delta, 0, BAND_MAX_PER_TIER);
  document.getElementById(`band-${i}-${tier}`).textContent = entry.weight[tier];
  document.getElementById(`band-total-${i}`).textContent = fmtWeight(entry.weightCfg, entry.weight);
}
function adjustRep(i, setIdx, delta) {
  const entry = state.entries[i];
  const cfg = STRENGTH_DAYS[state.day][i];
  const bounds = entry.variants ? cfg.variantOverrides[entry.item] : cfg;
  entry.reps[setIdx] = clamp(entry.reps[setIdx] + delta, bounds.repMin, bounds.repMax);
  document.getElementById(`rep-${i}-${setIdx}`).textContent = entry.reps[setIdx];
  if (!entry.topOverridden) {
    entry.topOfRange = entry.reps.every(r => r >= entry.repTop) ? "Y" : "N";
    updateTopBadge(i);
  }
}
function toggleTopOverride(i) {
  const entry = state.entries[i];
  entry.topOfRange = entry.topOfRange === "Y" ? "N" : "Y";
  entry.topOverridden = true;
  updateTopBadge(i);
}
function updateTopBadge(i) {
  const el = document.getElementById(`top-badge-${i}`);
  el.textContent = `Top of Range: ${state.entries[i].topOfRange}`;
  el.className = `badge ${state.entries[i].topOfRange==='Y'?'top':''}`;
}
function toggleNote(i) { state.entries[i].noteOpen = !state.entries[i].noteOpen; renderStrength(); }

function persistStrengthBaselines() {
  state.entries.forEach((entry, i) => {
    if (!entry.weightCfg) return;
    const key = `w_${state.day}_${entry.variantBase}${entry.variants ? '_' + entry.item : ''}`;
    lsSet(key, entry.weight);
  });
}

function buildStrengthPayload() {
  const entries = [];
  Object.keys(state.checklist).forEach(label => {
    entries.push({ item: label, category: "checklist", done: state.checklist[label] });
  });
  state.entries.forEach(e => {
    const rec = {
      item: e.item, category: "exercise",
      target: e.variantOverrideTarget || e.target || "",
      weight: !e.weightCfg ? "BW" : (e.weightCfg.type === "bandmix" ? String(bandTotal(e.weight)) : String(e.weight)),
      reps_or_time: e.reps.map(String),
      top_of_range: e.topOfRange, notes: e.notes || "",
    };
    if (e.weightCfg && e.weightCfg.type === "bandmix") {
      const breakdown = {};
      BAND_TIERS.forEach(t => { if (e.weight[t] > 0) breakdown[String(t)] = e.weight[t]; });
      rec.band_breakdown = breakdown;
    }
    entries.push(rec);
  });
  state.stretches.forEach(s => {
    entries.push({ item: s.item, category: "stretch", done: s.done });
  });
  return { schema_version: "1.1", date: state.date, day_type: "strength", day_number: state.day, entries };
}

function adjRom(d) { state.distance = clamp(Math.round((state.distance + d)*10)/10, 0, 14); document.getElementById('rom-val').textContent = state.distance + ' in'; }
function toggleRomNote() { state.noteOpen = !state.noteOpen; renderRom(); }
function buildRomPayload() {
  return { schema_version:"1.1", date: state.date, day_type:"rom_check", distance_from_floor_in: state.distance, notes: state.notes || "" };
}

/* ============================== REVIEW / SHARE ============================== */

function currentPayloadAndName() {
  switch (state.screen) {
    case 'strength': return [buildStrengthPayload(), `workout_strength_day${state.day}_${state.date}`];
    case 'cycling': return [buildCyclingPayload(), `workout_cycling_day${state.day}_${state.date}`];
    case 'yoga': return [buildYogaPayload(), `workout_yoga_${state.date}`];
    case 'achilles': return [buildAchillesPayload(), `workout_achilles_check_${state.date}`];
    case 'rom': return [buildRomPayload(), `workout_rom_check_${state.date}`];
  }
}
function backToEntry() {
  switch (state._returnScreen) {
    case 'strength': renderStrength(); break;
    case 'cycling': renderCycling(); break;
    case 'yoga': renderYoga(); break;
    case 'achilles': renderAchilles(); break;
    case 'rom': renderRom(); break;
  }
}
function showReview() {
  state._returnScreen = state.screen;
  const [payload, filenameBase] = currentPayloadAndName();
  app.innerHTML = `<a class="backlink" onclick="backToEntry()">&larr; Back to edit</a>
    <h1>Review</h1>
    <div class="card"><pre class="json-preview">${JSON.stringify(payload, null, 2)}</pre></div>
    <button class="btn" onclick="doShare('${filenameBase}')">Share via Mail</button>
    <button class="btn secondary" onclick="backToEntry()">Back to Edit</button>
    <button class="btn secondary" onclick="goHome()">Home</button>
    <div id="status"></div>`;
}
function doShare(filenameBase) {
  if (state._returnScreen === 'strength') persistStrengthBaselines();
  const [payload] = currentPayloadAndName();
  shareJSON(payload, filenameBase, 'status');
}

/* ============================== INIT ============================== */
renderHome();
</script>
</body>
</html>
