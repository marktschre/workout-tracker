<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Share Test</title>
<style>
  :root { color-scheme: light; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 480px; margin: 0 auto; padding: 24px 20px 60px;
    background: #f5f5f7; color: #1d1d1f;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  p.sub { color: #6e6e73; margin-top: 0; font-size: 14px; }
  button {
    width: 100%; padding: 18px; font-size: 17px; font-weight: 600;
    border: none; border-radius: 12px; background: #0071e3; color: white;
    margin-top: 20px; -webkit-tap-highlight-color: transparent;
  }
  button:active { background: #005bb5; }
  button:disabled { background: #b0b0b5; }
  #status {
    margin-top: 20px; padding: 14px; border-radius: 10px;
    font-size: 14px; line-height: 1.5; white-space: pre-wrap;
    background: white; border: 1px solid #d2d2d7; min-height: 24px;
  }
  .ok { border-color: #34c759; background: #eafff0; }
  .err { border-color: #ff3b30; background: #fff0ef; }
  code { background: #eee; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
</style>
</head>
<body>
  <h1>Share Test</h1>
  <p class="sub">Confirms Web Share → Mail actually attaches a real file, before we build anything else.</p>

  <button id="shareBtn">Share Test JSON File</button>
  <div id="status">Tap the button, then choose Mail from the share sheet. Check that the resulting draft has an attached file (not just text).</div>

  <script>
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('shareBtn');

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = cls || '';
    }

    btn.addEventListener('click', async () => {
      const payload = {
        schema_version: "1.0",
        date: new Date().toISOString().slice(0, 10),
        day_type: "strength",
        day_number: 1,
        entries: [
          { item: "Goblet Squat", category: "exercise", target: "10-12",
            weight: "30", reps_or_time: "12", top_of_range: "Y", notes: "share test" }
        ]
      };
      const json = JSON.stringify(payload, null, 2);
      const filename = `workout_test_${payload.date}.json`;
      const file = new File([json], filename, { type: "application/json" });

      if (!navigator.canShare) {
        setStatus("navigator.share isn't available at all in this browser context. If you're testing this on a laptop, that's expected — try it on the iPad in Safari.", "err");
        return;
      }
      if (!navigator.canShare({ files: [file] })) {
        setStatus("This browser reports it can share, but not files. That means the fallback (email body text only, no real attachment) is what we'd have to use.", "err");
        return;
      }
      try {
        await navigator.share({
          files: [file],
          title: "Workout Tracker Test",
          text: "Test file — confirming attachment works."
        });
        setStatus("Share sheet completed. Now check: did the Mail draft actually show " + filename + " as an attachment, not just text in the body? Open the draft and confirm before replying here.", "ok");
      } catch (err) {
        if (err.name === "AbortError") {
          setStatus("Share was cancelled — no error, just didn't complete. Tap again if that was accidental.", "");
        } else {
          setStatus("Share failed: " + err.name + " — " + err.message, "err");
        }
      }
    });
  </script>
</body>
</html>
