<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Workout Collector</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 520px; margin: 0 auto; padding: 16px 16px 80px;
    background: #f2f2f7; color: #1d1d1f;
  }
  h1 { font-size: 22px; margin: 8px 0 2px; }
  h2 { font-size: 18px; margin: 4px 0 12px; color: #3a3a3c; }
  .sub { color: #6e6e73; font-size: 13px; margin-top: 0; }
  .card {
    background: white; border-radius: 14px; padding: 14px 16px; margin-bottom: 12px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .btn {
    display: block; width: 100%; padding: 16px; font-size: 17px; font-weight: 600;
    border: none; border-radius: 12px; background: #0071e3; color: white; margin-top: 10px;
  }
  .btn:active { background: #005bb5; }
  .btn.secondary { background: #e5e5ea; color: #1d1d1f; }
  .btn.secondary:active { background: #d1d1d6; }
  .btn.small { padding: 10px; font-size: 14px; margin-top: 6px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .home-section-label { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em;
    color: #8e8e93; margin: 18px 4px 6px; }
  .ex-name { font-weight: 600; font-size: 16px; }
  .ex-target { color: #8e8e93; font-size: 13px; margin-bottom: 8px; }
  .stepper-row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; }
  .stepper-row .label { font-size: 14px; color: #48484a; width: 90px; flex-shrink: 0; }
  .stepper { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: flex-end; }
  .stepper button {
    width: 38px; height: 38px; border-radius: 10px; border: none; background: #e5e5ea;
    font-size: 20px; font-weight: 600; color: #1d1d1f; line-height: 1;
  }
  .stepper button:active { background: #d1d1d6; }
  .stepper .val { min-width: 76px; text-align: center; font-size: 16px; font-weight: 600; }
  .variant-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .variant-btn {
    flex: 1; padding: 10px 6px; border-radius: 10px; border: 1.5px solid #d1d1d6;
    background: white; font-size: 13px; font-weight: 600; color: #1d1d1f;
  }
  .variant-btn.selected { background: #0071e3; border-color: #0071e3; color: white; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; }
  .toggle-btn {
    padding: 8px 16px; border-radius: 20px; border: 1.5px solid #d1d1d6; background: white;
    font-size: 14px; font-weight: 600; color: #1d1d1f;
  }
  .toggle-btn.on { background: #34c759; border-color: #34c759; color: white; }
  .badge {
    display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 12px;
    font-weight: 600; background: #e5e5ea; color: #48484a; margin-top: 4px;
  }
  .badge.top { background: #34c759; color: white; }
  .note-link { font-size: 13px; color: #0071e3; margin-top: 4px; display: inline-block; }
  textarea.note-field, input.note-field {
    width: 100%; margin-top: 6px; padding: 8px; border-radius: 8px; border: 1px solid #d1d1d6;
    font-size: 14px; font-family: inherit;
  }
  hr.sep { border: none; border-top: 1px solid #e5e5ea; margin: 12px 0; }
  input[type="date"] {
    width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #d1d1d6;
    font-size: 16px; margin-top: 4px; background: white;
  }
  pre.json-preview {
    background: #1d1d1f; color: #7fd97f; font-size: 11px; padding: 10px; border-radius: 10px;
    overflow-x: auto; white-space: pre-wrap; word-break: break-word; margin-top: 12px;
  }
  #status {
    margin-top: 12px; padding: 12px; border-radius: 10px; font-size: 13px; line-height: 1.4;
    background: white; border: 1px solid #d2d2d7; display: none;
  }
  #status.show { display: block; }
  #status.ok { border-color: #34c759; background: #eafff0; }
  #status.err { border-color: #ff3b30; background: #fff0ef; }
  .backlink { font-size: 14px; color: #0071e3; margin-bottom: 10px; display: inline-block; }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================== CONFIG ============================== */

const STRENGTH_DAYS = {
  1: [
    { item:"Goblet Squat", target:"10-12", repMin:6, repMax:16, repDefault:10, repTop:12, unit:"reps",
      weight:{min:15,max:45,step:2.5,default:30,unit:"lbs"} },
    { item:"DB Step-Up", target:"10/leg", repMin:6, repMax:16, repDefault:10, repTop:10, unit:"reps/leg",
      weight:{min:0,max:25,step:2.5,default:0,unit:"lbs/hand",bwLabel:"BW"} },
    { item:"Pull-Up", target:"Max (target 5-10)", repMin:0, repMax:20, repDefault:5, repTop:10, unit:"reps",
      weight:{min:0,max:45,step:5,default:0,unit:"lbs added",bwLabel:"BW"} },
    { item:"Weighted Sit-Up", target:"15-20", repMin:8, repMax:25, repDefault:15, repTop:20, unit:"reps",
      weight:{min:0,max:15,step:2.5,default:0,unit:"lbs",bwLabel:"BW"} },
    { item:"Side Plank", target:"20-30s/side", repMin:10, repMax:45, repDefault:20, repTop:30, unit:"sec/side",
      weight:null },
  ],
  3: [
    { item:"Row", target:"10-12", unit:"reps",
      variants:["Seated Band Row","DB Bent-Over Row"],
      variantOverrides: {
        "Seated Band Row": { target:"10-12", repMin:6,repMax:16,repDefault:10,repTop:12,
          weight:{min:25,max:110,step:5,default:75,unit:"lbs (band)"} },
        "DB Bent-Over Row": { target:"10-12", repMin:6,repMax:16,repDefault:10,repTop:12,
          weight:{min:15,max:40,step:2.5,default:30,unit:"lbs/hand"} },
      } },
    { item:"Dip", target:"8-12 (Ring) / 15-20 (Push-Up)", unit:"reps",
      variants:["Ring Dip","Push-Up"],
      variantOverrides: {
        "Ring Dip": { target:"8-12", repMin:6,repMax:16,repDefault:8,repTop:12, weight:null },
        "Push-Up": { target:"15-20 or near-failure", repMin:8,repMax:30,repDefault:15,repTop:20, weight:null },
      } },
    { item:"DB Overhead Press", target:"10-12", repMin:6, repMax:16, repDefault:10, repTop:12, unit:"reps",
      weight:{min:10,max:35,step:2.5,default:20,unit:"lbs/hand"} },
    { item:"Band Face Pull", target:"15-20", repMin:10, repMax:25, repDefault:15, repTop:20, unit:"reps",
      weight:{min:1,max:4,step:1,default:1,unit:"band(s)"} },
    { item:"Pallof Press", target:"10-12/side", repMin:6, repMax:16, repDefault:10, repTop:12, unit:"reps/side",
      weight:{min:1,max:3,step:1,default:1,unit:"band(s)"} },
  ],
  4: [
    { item:"DB RDL (mid-shin)", target:"10-12", repMin:6, repMax:16, repDefault:10, repTop:12, unit:"reps",
      weight:{min:15,max:45,step:2.5,default:30,unit:"lbs/hand"} },
    { item:"Reverse Lunge", target:"10/leg", repMin:6, repMax:16, repDefault:10, repTop:10, unit:"reps/leg",
      weight:{min:0,max:30,step:2.5,default:17.5,unit:"lbs/hand",bwLabel:"BW"} },
    { item:"Pull-Up", target:"Max (target 5-10)", repMin:0, repMax:20, repDefault:5, repTop:10, unit:"reps",
      weight:{min:0,max:45,step:5,default:0,unit:"lbs added",bwLabel:"BW"} },
    { item:"Weighted Sit-Up", target:"15-20", repMin:8, repMax:25, repDefault:15, repTop:20, unit:"reps",
      weight:{min:0,max:15,step:2.5,default:0,unit:"lbs",bwLabel:"BW"} },
    { item:"Bird Dog", target:"8-10/side", repMin:4, repMax:16, repDefault:8, repTop:10, unit:"reps/side",
      weight:null },
  ],
  6: [
    { item:"Ring Row", target:"10-12", repMin:6, repMax:16, repDefault:10, repTop:12, unit:"reps",
      weight:null },
    { item:"Push-Up", target:"15-20 or near-failure", repMin:8, repMax:30, repDefault:15, repTop:20, unit:"reps",
      weight:null },
    { item:"DB Curl", target:"10-12", repMin:6, repMax:16, repDefault:10, repTop:12, unit:"reps",
      weight:{min:10,max:25,step:2.5,default:17.5,unit:"lbs/hand"} },
    { item:"Bird Dog", target:"8-10/side", repMin:4, repMax:16, repDefault:8, repTop:10, unit:"reps/side",
      weight:null },
  ],
};

/* ============================== HELPERS ============================== */

function todayLocal() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function yymmdd() {
  const d = new Date();
  return `${String(d.getFullYear()).slice(2)}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v === null ? fallback : JSON.parse(v); }
  catch (e) { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}
function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }
function fmtWeight(cfg, val) {
  if (!cfg) return "BW";
  if (val === 0 && cfg.bwLabel) return cfg.bwLabel;
  return `${val} ${cfg.unit}`;
}
function fmtReps(unit, val) { return `${val} ${unit}`; }

const app = document.getElementById('app');
let state = { screen: 'home' };

/* ============================== SHARE ============================== */

async function shareJSON(payload, filenameBase, statusElId) {
  const json = JSON.stringify(payload, null, 2);
  const filename = `${filenameBase}.json`;
  const file = new File([json], filename, { type: "application/json" });
  const statusEl = document.getElementById(statusElId);
  const show = (msg, cls) => {
    statusEl.textContent = msg;
    statusEl.className = 'show ' + (cls || '');
  };
  if (!navigator.canShare || !navigator.canShare({ files: [file] })) {
    show("This device/browser can't share files. Open this page in Safari on the iPad.", "err");
    return;
  }
  try {
    await navigator.share({ files: [file], title: `Workout ${yymmdd()}` });
    show(`Shared ${filename}. Confirm in Mail that the file is actually attached before sending.`, "ok");
  } catch (err) {
    if (err.name !== "AbortError") show("Share failed: " + err.message, "err");
  }
}

/* ============================== HOME ============================== */

function renderHome() {
  app.innerHTML = `
    <h1>Workout Collector</h1>
    <p class="sub">Tap a day to log it. Everything here is click/tap — no typing required except the rare optional note.</p>

    <div class="home-section-label">Strength Days</div>
    <div class="grid2">
      <button class="btn" onclick="goStrength(1)">Day 1</button>
      <button class="btn" onclick="goStrength(3)">Day 3</button>
      <button class="btn" onclick="goStrength(4)">Day 4</button>
      <button class="btn" onclick="goStrength(6)">Day 6</button>
    </div>

    <div class="home-section-label">Cycling Days</div>
    <div class="grid2">
      <button class="btn" onclick="goCycling(2)">Day 2</button>
      <button class="btn" onclick="goCycling(5)">Day 5</button>
    </div>

    <div class="home-section-label">Other</div>
    <button class="btn secondary" onclick="goYoga()">Day 7 — Yoga</button>
    <button class="btn secondary" onclick="goAchilles()">Weekly Achilles Check</button>
    <button class="btn secondary" onclick="goRom()">Hip Hinge ROM Check</button>
  `;
}
function goHome() { state = { screen: 'home' }; renderHome(); }

/* ============================== STRENGTH DAY ============================== */

function goStrength(dayNum) {
  const exList = STRENGTH_DAYS[dayNum];
  state = {
    screen: 'strength',
    day: dayNum,
    date: todayLocal(),
    checklist: { "Warm-up (5-min light cardio + dynamic prep)": false,
                 "Balance (single-leg stance, rest intervals)": false,
                 [`Stretches (Day ${dayNum} set)`]: false },
    entries: exList.map(cfg => {
      const active = cfg.variants ? cfg.variantOverrides[cfg.variants[0]] : cfg;
      const stored = lsGet(`w_${dayNum}_${cfg.item}${cfg.variants ? '_' + cfg.variants[0] : ''}`, null);
      return {
        item: cfg.variants ? cfg.variants[0] : cfg.item,
        variantBase: cfg.item,
        variants: cfg.variants || null,
        variantOverrideTarget: cfg.variants ? (active.target || '') : undefined,
        target: cfg.variants ? undefined : cfg.target,
        unit: cfg.unit,
        weightCfg: active.weight,
        weight: active.weight ? (stored !== null ? stored : active.weight.default) : "BW",
        reps: active.repDefault,
        repTop: active.repTop,
        topOfRange: active.repDefault >= active.repTop ? "Y" : "N",
        topOverridden: false,
        notes: "",
        noteOpen: false,
      };
    }),
  };
  renderStrength();
}

function renderStrength() {
  const dayNum = state.day;
  const exList = STRENGTH_DAYS[dayNum];
  let html = `<a class="backlink" onclick="goHome()">&larr; Home</a>
    <h1>Day ${dayNum}</h1>
    <div class="card">
      <label class="label" style="font-size:13px;color:#6e6e73;">Date</label>
      <input type="date" value="${state.date}" onchange="state.date=this.value">
    </div>
    <div class="card">`;

  Object.keys(state.checklist).forEach(label => {
    const on = state.checklist[label];
    html += `<div class="toggle-row" style="margin-bottom:8px;">
      <span style="font-size:14px;">${label}</span>
      <button class="toggle-btn ${on?'on':''}" onclick="toggleChecklist('${label.replace(/'/g,"\\'")}')">${on?'Done ✓':'Not done'}</button>
    </div>`;
  });
  html += `</div>`;

  state.entries.forEach((entry, i) => {
    const cfg = exList[i];
    html += `<div class="card" id="ex-card-${i}">`;
    if (entry.variants) {
      html += `<div class="ex-name">${entry.variantBase}</div>
        <div class="variant-row">
          ${entry.variants.map(v => `<button class="variant-btn ${entry.item===v?'selected':''}" onclick="selectVariant(${i},'${v.replace(/'/g,"\\'")}')">${v}</button>`).join('')}
        </div>`;
    } else {
      html += `<div class="ex-name">${entry.item}</div><div class="ex-target">Target: ${entry.target}</div>`;
    }
    html += renderExerciseControls(entry, i, cfg);
    html += `</div>`;
  });

  html += `<button class="btn" onclick="showReview()">Review &amp; Share</button>
    <div id="status"></div>`;
  app.innerHTML = html;
}

function renderExerciseControls(entry, i) {
  let html = entry.variants
    ? `<div class="ex-target" style="margin-top:0">Target: ${entry.variantOverrideTarget || ''}</div>`
    : '';
  // weight row
  if (entry.weightCfg) {
    html += `<div class="stepper-row">
      <span class="label">Weight</span>
      <div class="stepper">
        <button onclick="adjustWeight(${i}, -${entry.weightCfg.step})">−</button>
        <span class="val" id="w-val-${i}">${fmtWeight(entry.weightCfg, entry.weight)}</span>
        <button onclick="adjustWeight(${i}, ${entry.weightCfg.step})">+</button>
      </div>
    </div>`;
  } else {
    html += `<div class="stepper-row"><span class="label">Weight</span><span class="val">BW</span></div>`;
  }
  // reps row
  html += `<div class="stepper-row">
      <span class="label">Achieved</span>
      <div class="stepper">
        <button onclick="adjustReps(${i}, -1)">−</button>
        <span class="val" id="r-val-${i}">${fmtReps(entry.unit, entry.reps)}</span>
        <button onclick="adjustReps(${i}, 1)">+</button>
      </div>
    </div>
    <div>
      <span class="badge ${entry.topOfRange==='Y'?'top':''}" id="top-badge-${i}" onclick="toggleTopOverride(${i})">
        Top of Range: ${entry.topOfRange}
      </span>
    </div>
    <div>
      <a class="note-link" onclick="toggleNote(${i})">${entry.noteOpen?'Hide note':'+ note (variant used, pain, etc.)'}</a>
      ${entry.noteOpen ? `<input class="note-field" id="note-${i}" type="text" value="${entry.notes.replace(/"/g,'&quot;')}" oninput="state.entries[${i}].notes=this.value">` : ''}
    </div>`;
  return html;
}

function toggleChecklist(label) { state.checklist[label] = !state.checklist[label]; renderStrength(); }

function selectVariant(i, variantName) {
  const cfg = STRENGTH_DAYS[state.day][i];
  const ov = cfg.variantOverrides[variantName];
  const stored = lsGet(`w_${state.day}_${cfg.item}_${variantName}`, null);
  state.entries[i] = {
    item: variantName, variantBase: cfg.item, variants: cfg.variants,
    variantOverrideTarget: ov.target || '',
    unit: cfg.unit,
    weightCfg: ov.weight,
    weight: ov.weight ? (stored !== null ? stored : ov.weight.default) : "BW",
    reps: ov.repDefault, repTop: ov.repTop,
    topOfRange: ov.repDefault >= ov.repTop ? "Y" : "N",
    topOverridden: false, notes: state.entries[i].notes || "", noteOpen: state.entries[i].noteOpen || false,
  };
  renderStrength();
}

function adjustWeight(i, delta) {
  const entry = state.entries[i];
  entry.weight = clamp(Math.round((entry.weight + delta) * 100) / 100, entry.weightCfg.min, entry.weightCfg.max);
  document.getElementById(`w-val-${i}`).textContent = fmtWeight(entry.weightCfg, entry.weight);
  const cfg = STRENGTH_DAYS[state.day][i];
  const key = `w_${state.day}_${cfg.item}${entry.variants ? '_' + entry.item : ''}`;
  lsSet(key, entry.weight);
}

function adjustReps(i, delta) {
  const entry = state.entries[i];
  const cfg = STRENGTH_DAYS[state.day][i];
  const bounds = entry.variants ? cfg.variantOverrides[entry.item] : cfg;
  entry.reps = clamp(entry.reps + delta, bounds.repMin, bounds.repMax);
  document.getElementById(`r-val-${i}`).textContent = fmtReps(entry.unit, entry.reps);
  if (!entry.topOverridden) {
    entry.topOfRange = entry.reps >= entry.repTop ? "Y" : "N";
    updateTopBadge(i);
  }
}

function toggleTopOverride(i) {
  const entry = state.entries[i];
  entry.topOfRange = entry.topOfRange === "Y" ? "N" : "Y";
  entry.topOverridden = true;
  updateTopBadge(i);
}
function updateTopBadge(i) {
  const el = document.getElementById(`top-badge-${i}`);
  el.textContent = `Top of Range: ${state.entries[i].topOfRange}`;
  el.className = `badge ${state.entries[i].topOfRange==='Y'?'top':''}`;
}
function toggleNote(i) { state.entries[i].noteOpen = !state.entries[i].noteOpen; renderStrength(); }

function buildStrengthPayload() {
  const entries = [];
  Object.keys(state.checklist).forEach(label => {
    entries.push({ item: label, category: "checklist", done: state.checklist[label] });
  });
  state.entries.forEach(e => {
    entries.push({
      item: e.item, category: "exercise",
      target: e.variantOverrideTarget || e.target || "",
      weight: String(e.weight), reps_or_time: String(e.reps),
      top_of_range: e.topOfRange, notes: e.notes || "",
    });
  });
  return { schema_version: "1.0", date: state.date, day_type: "strength", day_number: state.day, entries };
}

/* ============================== CYCLING ============================== */

function goCycling(dayNum) {
  state = { screen:'cycling', day:dayNum, date: todayLocal(), phase:'Recovery', miles:10, duration:60, notes:'', noteOpen:false };
  renderCycling();
}
function renderCycling() {
  const phases = ['Recovery','Half-max','Max'];
  app.innerHTML = `<a class="backlink" onclick="goHome()">&larr; Home</a>
    <h1>Day ${state.day} — Cycling</h1>
    <div class="card">
      <label style="font-size:13px;color:#6e6e73;">Date</label>
      <input type="date" value="${state.date}" onchange="state.date=this.value">
    </div>
    <div class="card">
      <div class="label" style="font-size:14px;margin-bottom:6px;">Rotation Phase</div>
      <div class="grid3">
        ${phases.map(p => `<button class="variant-btn ${state.phase===p?'selected':''}" onclick="setPhase('${p}')">${p}</button>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="stepper-row"><span class="label">Miles</span>
        <div class="stepper">
          <button onclick="adjMiles(-5)">−5</button>
          <button onclick="adjMiles(-1)">−1</button>
          <span class="val" id="miles-val">${state.miles} mi</span>
          <button onclick="adjMiles(1)">+1</button>
          <button onclick="adjMiles(5)">+5</button>
        </div>
      </div>
      <div class="stepper-row"><span class="label">Duration</span>
        <div class="stepper">
          <button onclick="adjDuration(-15)">−15</button>
          <button onclick="adjDuration(-5)">−5</button>
          <span class="val" id="dur-val">${state.duration} min</span>
          <button onclick="adjDuration(5)">+5</button>
          <button onclick="adjDuration(15)">+15</button>
        </div>
      </div>
      <a class="note-link" onclick="toggleCyclingNote()">${state.noteOpen?'Hide note':'+ note'}</a>
      ${state.noteOpen ? `<input class="note-field" type="text" value="${state.notes.replace(/"/g,'&quot;')}" oninput="state.notes=this.value">` : ''}
    </div>
    <button class="btn" onclick="showReview()">Review &amp; Share</button>
    <div id="status"></div>`;
}
function setPhase(p) { state.phase = p; renderCycling(); }
function adjMiles(d) { state.miles = clamp(state.miles + d, 0, 110); document.getElementById('miles-val').textContent = state.miles + ' mi'; }
function adjDuration(d) { state.duration = clamp(state.duration + d, 0, 360); document.getElementById('dur-val').textContent = state.duration + ' min'; }
function toggleCyclingNote() { state.noteOpen = !state.noteOpen; renderCycling(); }
function buildCyclingPayload() {
  return { schema_version:"1.0", date: state.date, day_type:"cycling", day_number: state.day,
    phase: state.phase, miles: state.miles, duration_min: state.duration, notes: state.notes || "" };
}

/* ============================== YOGA ============================== */

function goYoga() { state = { screen:'yoga', date: todayLocal(), completed: true, notes:'', noteOpen:false }; renderYoga(); }
function renderYoga() {
  app.innerHTML = `<a class="backlink" onclick="goHome()">&larr; Home</a>
    <h1>Day 7 — Yoga</h1>
    <div class="card">
      <label style="font-size:13px;color:#6e6e73;">Date</label>
      <input type="date" value="${state.date}" onchange="state.date=this.value">
    </div>
    <div class="card">
      <div class="toggle-row">
        <span>Completed</span>
        <button class="toggle-btn ${state.completed?'on':''}" onclick="toggleYogaDone()">${state.completed?'Yes ✓':'No'}</button>
      </div>
      <a class="note-link" onclick="toggleYogaNote()">${state.noteOpen?'Hide note':'+ note'}</a>
      ${state.noteOpen ? `<input class="note-field" type="text" value="${state.notes.replace(/"/g,'&quot;')}" oninput="state.notes=this.value">` : ''}
    </div>
    <button class="btn" onclick="showReview()">Review &amp; Share</button>
    <div id="status"></div>`;
}
function toggleYogaDone() { state.completed = !state.completed; renderYoga(); }
function toggleYogaNote() { state.noteOpen = !state.noteOpen; renderYoga(); }
function buildYogaPayload() {
  return { schema_version:"1.0", date: state.date, day_type:"yoga", completed: state.completed, notes: state.notes || "" };
}

/* ============================== ACHILLES CHECK ============================== */

function goAchilles() { state = { screen:'achilles', date: todayLocal(), pain: 0, increased: false, notes:'', noteOpen:false }; renderAchilles(); }
function renderAchilles() {
  app.innerHTML = `<a class="backlink" onclick="goHome()">&larr; Home</a>
    <h1>Weekly Achilles Check</h1>
    <div class="card">
      <label style="font-size:13px;color:#6e6e73;">Date</label>
      <input type="date" value="${state.date}" onchange="state.date=this.value">
    </div>
    <div class="card">
      <div class="label" style="font-size:14px;margin-bottom:6px;">Pain / Stiffness (0-5)</div>
      <div class="grid3" style="margin-bottom:8px;">
        ${[0,1,2].map(n=>`<button class="variant-btn ${state.pain===n?'selected':''}" onclick="setPain(${n})">${n}</button>`).join('')}
      </div>
      <div class="grid3">
        ${[3,4,5].map(n=>`<button class="variant-btn ${state.pain===n?'selected':''}" onclick="setPain(${n})">${n}</button>`).join('')}
      </div>
      <hr class="sep">
      <div class="toggle-row">
        <span style="font-size:14px;">Morning stiffness increased?</span>
        <button class="toggle-btn ${state.increased?'on':''}" onclick="toggleIncreased()">${state.increased?'Yes':'No'}</button>
      </div>
      <a class="note-link" onclick="toggleAchNote()">${state.noteOpen?'Hide note':'+ note'}</a>
      ${state.noteOpen ? `<input class="note-field" type="text" value="${state.notes.replace(/"/g,'&quot;')}" oninput="state.notes=this.value">` : ''}
    </div>
    <button class="btn" onclick="showReview()">Review &amp; Share</button>
    <div id="status"></div>`;
}
function setPain(n) { state.pain = n; renderAchilles(); }
function toggleIncreased() { state.increased = !state.increased; renderAchilles(); }
function toggleAchNote() { state.noteOpen = !state.noteOpen; renderAchilles(); }
function buildAchillesPayload() {
  return { schema_version:"1.0", date: state.date, day_type:"achilles_check",
    pain_stiffness: state.pain, morning_stiffness_increased: state.increased, notes: state.notes || "" };
}

/* ============================== ROM CHECK ============================== */

function goRom() { state = { screen:'rom', date: todayLocal(), distance: 5.5, notes:'', noteOpen:false }; renderRom(); }
function renderRom() {
  app.innerHTML = `<a class="backlink" onclick="goHome()">&larr; Home</a>
    <h1>Hip Hinge ROM Check</h1>
    <p class="sub">Every 4–6 weeks.</p>
    <div class="card">
      <label style="font-size:13px;color:#6e6e73;">Date</label>
      <input type="date" value="${state.date}" onchange="state.date=this.value">
    </div>
    <div class="card">
      <div class="stepper-row"><span class="label">Distance</span>
        <div class="stepper">
          <button onclick="adjRom(-0.5)">−</button>
          <span class="val" id="rom-val">${state.distance} in</span>
          <button onclick="adjRom(0.5)">+</button>
        </div>
      </div>
      <a class="note-link" onclick="toggleRomNote()">${state.noteOpen?'Hide note':'+ note'}</a>
      ${state.noteOpen ? `<input class="note-field" type="text" value="${state.notes.replace(/"/g,'&quot;')}" oninput="state.notes=this.value">` : ''}
    </div>
    <button class="btn" onclick="showReview()">Review &amp; Share</button>
    <div id="status"></div>`;
}
function adjRom(d) { state.distance = clamp(Math.round((state.distance + d)*10)/10, 0, 14); document.getElementById('rom-val').textContent = state.distance + ' in'; }
function toggleRomNote() { state.noteOpen = !state.noteOpen; renderRom(); }
function buildRomPayload() {
  return { schema_version:"1.0", date: state.date, day_type:"rom_check", distance_from_floor_in: state.distance, notes: state.notes || "" };
}

/* ============================== REVIEW / SHARE ============================== */

function currentPayloadAndName() {
  switch (state.screen) {
    case 'strength': return [buildStrengthPayload(), `workout_strength_day${state.day}_${state.date}`];
    case 'cycling': return [buildCyclingPayload(), `workout_cycling_day${state.day}_${state.date}`];
    case 'yoga': return [buildYogaPayload(), `workout_yoga_${state.date}`];
    case 'achilles': return [buildAchillesPayload(), `workout_achilles_check_${state.date}`];
    case 'rom': return [buildRomPayload(), `workout_rom_check_${state.date}`];
  }
}
function backToEntry() {
  switch (state._returnScreen) {
    case 'strength': renderStrength(); break;
    case 'cycling': renderCycling(); break;
    case 'yoga': renderYoga(); break;
    case 'achilles': renderAchilles(); break;
    case 'rom': renderRom(); break;
  }
}
function showReview() {
  state._returnScreen = state.screen;
  const [payload, filenameBase] = currentPayloadAndName();
  app.innerHTML = `<a class="backlink" onclick="backToEntry()">&larr; Back to edit</a>
    <h1>Review</h1>
    <div class="card"><pre class="json-preview">${JSON.stringify(payload, null, 2)}</pre></div>
    <button class="btn" onclick="doShare('${filenameBase}')">Share via Mail</button>
    <button class="btn secondary" onclick="backToEntry()">Back to Edit</button>
    <div id="status"></div>`;
}
function doShare(filenameBase) {
  const [payload] = currentPayloadAndName();
  shareJSON(payload, filenameBase, 'status');
}

/* ============================== INIT ============================== */
renderHome();
</script>
</body>
</html>
